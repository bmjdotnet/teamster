interface:
  display_name: "Teamster Solo"
  short_description: "Start a WMS-tracked solo Teamster session"
  default_prompt: "Use $teamster-solo to start a WMS-tracked session for this work."

dependencies:
  tools:
    - type: "mcp"
      value: "wms"
      description: "Outcome/WorkUnit CRUD, tags, focus, dependencies"
    - type: "mcp"
      value: "activity"
      description: "Activity feed narration (reportActivity/setOverallIntent/completeActivity)"

policy:
  allow_implicit_invocation: false
